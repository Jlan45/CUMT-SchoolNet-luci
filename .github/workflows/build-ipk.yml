name: Build IPK Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  OPENWRT_SDK_VERSION: "23.05.5"
  OPENWRT_SDK_NAME: "openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up OpenWrt SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: openwrt-sdk-${{ env.OPENWRT_SDK_VERSION }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget https://downloads.openwrt.org/releases/${{ env.OPENWRT_SDK_VERSION }}/targets/x86/64/${{ env.OPENWRT_SDK_NAME }}.tar.xz
          tar -xJf ${{ env.OPENWRT_SDK_NAME }}.tar.xz
          mv ${{ env.OPENWRT_SDK_NAME }} openwrt-sdk

      - name: Set package version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PKG_VER="${GITHUB_REF_NAME#v}"
          else
            PKG_VER="$(git describe --tags --always --dirty 2>/dev/null || echo '0.0.0')"
          fi
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${PKG_VER}/" Makefile
          echo "PKG_VERSION=${PKG_VER}" >> $GITHUB_ENV

      - name: Copy package to SDK
        run: |
          mkdir -p openwrt-sdk/package/cumtlogin
          cp -r ./* openwrt-sdk/package/cumtlogin/ || true
          ls -la openwrt-sdk/package/cumtlogin/

      - name: Build package
        run: |
          cd openwrt-sdk

          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Configure
          make defconfig

          # Build the package
          make package/cumtlogin/compile V=s

      - name: Collect IPK files
        run: |
          mkdir -p artifacts
          find openwrt-sdk/bin/packages/ -name "cumtlogin*.ipk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cumtlogin-ipk
          path: artifacts/*.ipk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
